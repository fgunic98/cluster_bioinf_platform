replicaCount: 2

image:
  repository: simple-java-api
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

containerPort: 8080

env:
  SPRING_PROFILES_ACTIVE: docker
  SERVER_PORT: "8080"

resources: {}

livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

