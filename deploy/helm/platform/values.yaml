# ---------------------------------------------------------------------------
# Postgres
# ---------------------------------------------------------------------------
# Toggle: when true, the Bitnami postgresql subchart is installed and the
# custom Postgres templates in this chart are skipped.
# When false (default), the custom Postgres StatefulSet is installed and the
# Bitnami subchart is not pulled in (controlled by the dependency `condition`
# in Chart.yaml — both must agree).
postgres:
  bitnami:
    enabled: false

  # ---- Settings used when bitnami.enabled is false (custom Postgres) ----
  image:
    repository: postgres
    tag: "16"               # pin major version; never `latest` for stateful workloads
    pullPolicy: IfNotPresent

  auth:
    database: platformDB
    # username and password are NOT set here.
    # Provide them via values-secrets.yaml at install time.
    # See values-secrets.example.yaml for the expected shape.

  storage:
    size: 4Gi
    # storageClassName: ""  # uncomment to override; empty string = cluster default

  service:
    port: 5432

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# ---------------------------------------------------------------------------
# Platform API (Spring Boot)
# ---------------------------------------------------------------------------
api:
  image:
    repository: platform-api
    tag: local
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi